<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StoryDeck</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root {
    --bg: #0b0d12; --fg: #f4f5f7; --muted: #9aa3b2; --accent: #6ea8fe;
    --hot: #ff2d55; --ok: #4ade80; --warn: #fbbf24;
    --scene-pad: clamp(1.5rem, 5vw, 6rem);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* Le deck empile les scènes en 100vh → il existe un scroll vertical natif
     (en plus de la navigation clic/flèche/molette). On masque la scrollbar :
     rendu « présentation » net et identique en file:// et servi dans l'iframe. */
  html { scrollbar-width: none; }              /* Firefox */
  html::-webkit-scrollbar { display: none; }   /* Chrome/Safari/Edge */
  body { background: var(--bg); color: var(--fg); overflow-x: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; }

  .scene { min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
    padding: var(--scene-pad); position: relative; }
  .scene__media { position: absolute; inset: 0; background-size: cover; background-position: center;
    opacity: 0; transition: opacity .8s ease; z-index: 0; }
  .scene.is-active .scene__media { opacity: 1; }
  .scene__overlay { position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(11,13,18,.2), rgba(11,13,18,.85)); }
  /* voile renforcé pour vidéo de fond (texte lisible par-dessus) */
  .scene__overlay--strong { background:
    linear-gradient(90deg, rgba(11,13,18,.92), rgba(11,13,18,.55) 60%, rgba(11,13,18,.78)); }
  .scene__video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    z-index: 0; opacity: 0; transition: opacity .8s ease; }
  .scene.is-active .scene__video { opacity: 1; }
  .scene__content { position: relative; z-index: 2; max-width: 62ch; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
  .scene.is-active .reveal { opacity: 1; transform: none; }
  .scene.is-active .reveal:nth-child(2) { transition-delay: .15s; }
  .scene.is-active .reveal:nth-child(3) { transition-delay: .3s; }

  h1 { font-size: clamp(2.2rem, 6vw, 4.5rem); line-height: 1.05; letter-spacing: -.02em; }
  h2 { font-size: clamp(1.6rem, 4vw, 3rem); line-height: 1.1; letter-spacing: -.01em; margin-bottom: .6em; }
  .scene--bigtext h2 { font-size: clamp(3rem, 8vw, 6.5rem); line-height: 1.1; }
  /* figure — titre + grande image centrée (capture / tweet) */
  .scene--figure .scene__content { display: flex; flex-direction: column; align-items: center; gap: clamp(1rem, 3vh, 2rem); max-width: none; width: 100%; }
  .figure__img { max-width: min(78vw, 900px); max-height: 66vh; width: auto; height: auto; object-fit: contain;
    border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
  .figure__cap { text-align: center; }
  p.lead { font-size: clamp(1.1rem, 2.2vw, 1.5rem); color: var(--muted); margin-top: 1em; }
  /* slide data team : titre blanc plus grand */
  .scene--dual h2 { color: #fff; font-size: clamp(2.2rem, 5vw, 3.8rem); }

  /* embed — vidéo (capture site) en grand + petit titre */
  .scene--embed { align-items: center; }
  .scene--embed .scene__content { max-width: none; width: 100%; display: flex; flex-direction: column;
    align-items: center; gap: 1rem; }
  .embed__title { color: var(--muted); font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 600; letter-spacing: .02em; }
  .embed__frame { position: relative; width: min(1100px, 88vw); aspect-ratio: 16 / 9; max-height: 78vh;
    border-radius: 16px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,.6); border: 1px solid #2a3140; background: #000; }
  .embed__poster, .embed__video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  /* poster (home) visible au départ ; vidéo cachée. Au clic (.playing) : on bascule. */
  .embed__video { opacity: 0; transition: opacity .4s ease; }
  .embed__frame.playing .embed__poster { opacity: 0; }
  .embed__frame.playing .embed__video { opacity: 1; }

  /* slide titre : titre plus grand, sous-titre plus grand ET blanc */
  .scene--title h1 { font-size: clamp(3rem, 8.5vw, 6.5rem); }
  .scene--title .lead { color: #fff; font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 500; }
  /* mots-clés mis en avant dans une phrase (sur vidéo : blanc franc + accent) */
  .hl { color: #fff; font-weight: 800; }
  .hl--accent { color: var(--accent); font-weight: 800; }

  .stat { font-size: clamp(4rem, 16vw, 12rem); font-weight: 800; letter-spacing: -.04em;
    color: var(--accent); font-variant-numeric: tabular-nums; }
  .stat__label { color: var(--muted); font-size: clamp(1rem, 2.5vw, 1.6rem); }

  .compare { display: flex; align-items: center; gap: clamp(1rem, 4vw, 3rem); margin: .5em 0; flex-wrap: wrap; }
  .compare__val { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .compare__lbl { color: var(--muted); font-size: 1rem; }
  .compare__arrow { font-size: clamp(2rem, 6vw, 4rem); color: var(--muted); }

  .chart { width: min(760px, 90vw); height: min(420px, 55vh); margin-top: .5em; }
  .chart .bar { fill: var(--accent); }
  .chart .bar--hl { fill: var(--hot); }
  .chart .hl-label { font-size: 15px; }
  .chart text { fill: var(--muted); font-size: 13px; }
  .chart .domain, .chart .tick line { stroke: #2a3140; }

  /* dashboard — 3 indicateurs sur UNE rangée, box agrandies pour la lisibilité */
  .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(1rem, 2vw, 1.8rem);
    margin-top: 1.2rem; align-items: stretch; }
  .dash__panel { padding: clamp(1.4rem, 2.2vw, 2.2rem); border-radius: 18px;
    border: 1px solid #2a3140; background: linear-gradient(160deg, #161b24, #0e1219);
    display: flex; flex-direction: column; min-width: 0;
    transition: opacity .5s ease, transform .5s cubic-bezier(.34,1.4,.5,1); }
  .dash__panel--hidden { opacity: 0; transform: translateY(24px) scale(.96); pointer-events: none; }
  .dash__title { font-size: clamp(1.05rem, 1.7vw, 1.35rem); font-weight: 700; color: #e7eaf0;
    margin-bottom: .7em; min-height: 2.6em; }
  .dash__chart { width: 100%; height: clamp(240px, 34vh, 360px); }
  .dash__chart .bar { fill: var(--accent); }
  .dash__chart .bar--hl { fill: var(--hot); }
  .dash__chart text { fill: var(--muted); font-size: 15px; }
  .dash__chart .hl-label { font-size: 17px; }
  .dash__chart .domain, .dash__chart .tick line { stroke: #2a3140; }
  .dash__stat { font-size: clamp(3.6rem, 7vw, 6rem); font-weight: 800; color: var(--accent);
    letter-spacing: -.03em; font-variant-numeric: tabular-nums; line-height: 1; }
  .dash__unit { font-size: 1.6rem; color: var(--accent); font-weight: 700; display: inline; }
  .dash__delta { font-size: clamp(1rem, 1.6vw, 1.25rem); font-weight: 700; margin-top: .5em; color: var(--hot); }
  .dash__label { font-size: clamp(.9rem, 1.4vw, 1.05rem); color: var(--muted); margin-top: .5em; flex: 1; }
  .dash__source { font-size: .75rem; color: #5a6478; margin-top: .7em; }

  /* les 5 points clés sous les graphes, en chaîne, qui s'allument un par un */
  .dash__points { display: flex; flex-wrap: wrap; align-items: center; gap: .5em .9em;
    margin-top: clamp(1.4rem, 3vh, 2.4rem); font-size: clamp(1.05rem, 2vw, 1.6rem); font-weight: 600; }
  .dash__point, .dash__sep { opacity: 0; transform: translateY(12px);
    transition: opacity .5s ease, transform .5s ease; color: #e7eaf0; }
  .dash__sep { color: var(--muted); }
  .dash__point.on, .dash__sep.on { opacity: 1; transform: none; }
  .dash__points .hl { color: #fff; font-weight: 800; }
  .dash__points .hl--accent { color: var(--accent); font-weight: 800; }

  /* slide dense : contenu collé en haut + pleine largeur (box plus larges) */
  .scene--dash { justify-content: flex-start; padding-top: clamp(2.5rem, 6vh, 4rem); }
  .scene--dash .scene__content { max-width: none; width: 100%; }
  .scene--dash h2 { font-size: clamp(1.5rem, 3vw, 2.3rem); margin-bottom: .3em; }

  /* dualline — deux courbes superposées */
  .dual { margin-top: 1rem; }
  .dual__svg { width: min(880px, 92vw); height: min(440px, 52vh); }
  .dual__svg text { fill: var(--muted); font-size: 13px; }
  .dual__svg .domain, .dual__svg .tick line { stroke: #2a3140; }
  .dual__legend { display: flex; gap: 2rem; margin-top: 1rem; font-size: clamp(.9rem, 1.7vw, 1.15rem); }
  .dual__key { display: flex; align-items: center; gap: .5em; color: #e7eaf0; font-weight: 600; }
  .dual__key i { width: 22px; height: 4px; border-radius: 2px; display: inline-block; }

  /* bars2 — deux barres horizontales segmentées comparées (Avant / Aujourd'hui) */
  .scene--bars2 .scene__content { max-width: none; width: 100%; }
  .b2 { display: flex; flex-direction: column; gap: clamp(1.5rem, 4vh, 3rem); margin-top: 1.5rem; }
  .b2__row { display: flex; align-items: center; gap: 1.2rem; }
  .b2__label { flex: 0 0 clamp(120px, 14vw, 190px); font-size: clamp(1.1rem, 2.2vw, 1.6rem);
    font-weight: 800; color: #fff; text-align: right; }
  .b2__track { flex: 1; display: flex; height: clamp(56px, 9vh, 92px); border-radius: 12px; overflow: hidden;
    background: #141a26; }
  .b2__seg { width: 0; background: var(--c); display: flex; align-items: center; justify-content: center;
    overflow: hidden; white-space: nowrap; transition: width .7s cubic-bezier(.34,1.1,.5,1);
    border-right: 2px solid #0b0d12; }
  .b2__seg.on { width: var(--pct); }
  .b2__seg span { font-size: clamp(.8rem, 1.5vw, 1.1rem); font-weight: 700; color: #0b0d12; opacity: 0;
    transition: opacity .4s ease .3s; padding: 0 .4em; }
  .b2__seg.on span { opacity: 1; }
  .b2__cap { text-align: center; margin-top: 1.5rem; }

  /* stack — logos en grille par couches, grands, SANS cadre, sur fond sombre */
  .scene--stack { justify-content: center; align-items: center; }
  .scene--stack .scene__content { max-width: none; width: 100%; }
  .scene--stack .stk__sub { color: var(--muted); font-size: clamp(1.1rem, 2.2vw, 1.6rem);
    min-height: 1.6em; margin-bottom: 1.5rem; text-align: center; }
  .scene--stack .stk__sub .hl { color:#fff; font-weight:800; }
  .scene--stack .stk__sub .hl--accent { color:var(--accent); font-weight:800; }
  .stk__grid { display: flex; align-items: flex-start; justify-content: center;
    gap: clamp(.6rem, 1.4vw, 1.6rem); width: 100%; max-width: 1200px; margin: 0 auto; flex-wrap: nowrap; }
  .stk__col { display: flex; flex-direction: column; gap: clamp(1.2rem, 2.4vh, 2.4rem);
    align-items: center; justify-content: flex-start; flex: 0 1 auto; }
  .stk__flow { color: #3a4150; font-size: clamp(1.5rem, 3vw, 2.6rem); align-self: center; }
  /* largeur de tuile FIXE → un logo plus étroit/large ne fait pas bouger la colonne */
  .stk__tile { position: relative; width: clamp(120px, 15vw, 190px); box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; gap: .6em;
    opacity: 0; transform: translateY(20px) scale(.85);
    transition: opacity .5s ease, transform .55s cubic-bezier(.34,1.4,.5,1); }
  .stk__tile.on { opacity: 1; transform: none; }
  .stk__tile img { width: auto; height: clamp(56px, 8vw, 110px); object-fit: contain;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.5)); }
  /* Metabase : glyphe carré dense → légèrement réduit pour matcher l'échelle visuelle */
  .stk__tile[data-id="metabase"] img { height: clamp(46px, 6.5vw, 90px); }
  .stk__tile figcaption { font-size: clamp(.8rem, 1.4vw, 1.05rem); font-weight: 700; color: #e7eaf0; }
  /* slot : remplacé + remplaçant superposés au MÊME endroit */
  .stk__slot { position: relative; }
  .stk__slot .stk__tile + .stk__tile { position: absolute; inset: 0; }
  /* remplacé : disparaît (fade out, pas de croix) */
  .stk__tile.stk__gone { opacity: 0; transform: scale(.6); pointer-events: none; }
  /* remplaçant : léger halo d'accent */
  /* remplaçant : même rendu que les autres logos (pas de halo bleu) */
  .stk__tile.stk__repl img { filter: drop-shadow(0 6px 16px rgba(0,0,0,.5)); }
  /* absorbé : rétréci et glissé sous l'hôte (subtil, sans légende) */
  .stk__tile.stk__absorbed { transform: translateY(46px) scale(.42); opacity: .55; z-index: 0; }
  .stk__tile.stk__absorbed figcaption { display: none; }
  .stk__tile.stk__host { z-index: 2; }
  /* morph : un logo se transforme en un autre (Census → Fivetran) */
  .stk__tile.stk__morph img { animation: morph-swap .7s ease; }
  @keyframes morph-swap { 0% { opacity: 0; transform: scale(.6) rotate(-8deg); }
    60% { opacity: 1; } 100% { transform: scale(1) rotate(0); } }

  /* drops — coupures de presse lancées comme des polaroïds par-dessus la scène */
  .drops { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
  /* --nx/--ny/--nr : décalage de "bousculade" appliqué quand une nouvelle photo tombe dessus */
  /* sans cadre : coupures brutes qui s'empilent à droite (effet buzz / "trop") */
  .drop { position: absolute; left: var(--x); top: var(--y);
    --nx: 0px; --ny: 0px; --nr: 0deg;
    width: clamp(280px, 34vw, 540px);
    border-radius: 3px; overflow: hidden;
    box-shadow: 0 14px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(0,0,0,.25);
    opacity: 0;
    transform: translate(0, -120vh) rotate(calc(var(--rot) * 2.5)) scale(1.22);
    will-change: transform, opacity; margin: 0; }
  /* atterrissage avec overshoot (ressort) — donne du poids à la chute */
  .drop.landed { opacity: 1;
    transform: translate(var(--nx), var(--ny)) rotate(calc(var(--rot) + var(--nr))) scale(1);
    transition: transform .7s cubic-bezier(.34, 1.4, .5, 1), opacity .3s ease; }
  /* micro-secousse des photos déjà posées quand une nouvelle s'écrase dessus */
  .drop.jostled { transition: transform .35s cubic-bezier(.2,.8,.25,1); }
  .drop img { display: block; width: 100%; }

  /* quote — slide-respiration plein écran */
  .scene--quote .scene__content { max-width: 22ch; }
  .quote { font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 700; line-height: 1.12; letter-spacing: -.02em; border: 0; }
  .scene--quote cite { display: block; margin-top: 1em; color: var(--muted); font-style: normal; font-size: 1rem; }

  /* grid — cases qui s'allument */
  .grid { display: flex; gap: clamp(.6rem, 2vw, 1.4rem); margin: .8em 0; flex-wrap: wrap; }
  .grid__cell { flex: 1 1 0; min-width: 180px; padding: clamp(1rem, 3vw, 2.2rem); border: 2px solid #2a3140;
    border-radius: 14px; opacity: .25; transform: scale(.96); transition: all .5s ease; }
  .grid__cell.on { opacity: 1; transform: none; border-color: var(--muted); }
  .grid__cell[data-accent].on { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,254,.25); }
  .grid__cell-title { font-size: clamp(1.4rem, 3.5vw, 2.4rem); font-weight: 800; letter-spacing: -.01em; }
  .grid__cell-sub { color: var(--muted); margin-top: .4em; font-size: .95rem; }

  /* list — puces qui s'empilent */
  .stacklist { list-style: none; margin: .6em 0; max-width: 50ch; }
  .stacklist li { font-size: clamp(1.1rem, 2.4vw, 1.7rem); padding: .5em 0 .5em 1.4em; position: relative;
    opacity: 0; transform: translateX(-16px); transition: all .5s ease; }
  .stacklist li.on { opacity: 1; transform: none; }
  .stacklist li::before { content: none; }
  /* variante sans puce : items plus grands, alignés à gauche, sur photo de fond */
  .stacklist--plain li { padding-left: 0; font-size: clamp(1.6rem, 4vw, 3rem); font-weight: 800;
    color: #fff; text-shadow: 0 2px 16px rgba(0,0,0,.8); line-height: 1.5; }
  .stacklist--plain li::before { content: none; }
  /* photo claire en fond → voile gauche renforcé pour lisibilité du texte */
  .scene:has(.stacklist--plain) .scene__overlay {
    background: linear-gradient(90deg, rgba(11,13,18,.92), rgba(11,13,18,.55) 55%, rgba(11,13,18,.15)); }
  /* liste + capture côte à côte */
  .scene--list-img .scene__content { max-width: none; width: 100%; }
  .list-split { display: flex; gap: clamp(1.5rem, 4vw, 3.5rem); align-items: center; }
  .list-split__text { flex: 1 1 60%; min-width: 0; }
  .list-split__img { flex: 0 0 42%; max-width: 42%; max-height: 62vh; width: auto; height: auto; object-fit: contain;
    border-radius: 12px; box-shadow: 0 18px 50px rgba(0,0,0,.55); border: 1px solid #2a3140; }
  .list-split__img--bare { border: none; box-shadow: none; background: transparent; }
  /* brique Lego animée : se cale à l'entrée puis flotte doucement en boucle */
  .scene.is-active .list-split__img--float {
    animation: brick-settle .9s cubic-bezier(.34,1.4,.5,1) both, brick-float 3.4s ease-in-out 1s infinite; }
  @keyframes brick-settle {
    0%   { opacity: 0; transform: translateY(-40px) rotate(-4deg) scale(.94); }
    100% { opacity: 1; transform: translateY(0) rotate(0) scale(1); } }
  @keyframes brick-float {
    0%,100% { transform: translateY(0) rotate(-1.4deg); }
    50%     { transform: translateY(-22px) rotate(1.8deg); } }


  /* versus — logos alignés avec « VS » entre eux */
  .scene--versus .scene__content { max-width: none; width: 100%; }
  .scene--versus .decis { flex: none; margin-top: clamp(2rem, 5vh, 3.5rem); }
  .vs { display: flex; align-items: center; justify-content: center; gap: clamp(1rem, 3vw, 2.5rem); margin-top: 1rem; }
  .vs__item { position: relative; display: flex; flex-direction: column; align-items: center; gap: .8em;
    opacity: 0; transform: translateY(20px) scale(.9); transition: opacity .5s ease, transform .5s cubic-bezier(.34,1.4,.5,1); }
  .vs__item.on { opacity: 1; transform: none; }
  /* croix rouge qui se superpose sur un item éliminé (au clic) */
  .vs__cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.2) rotate(-8deg);
    font-size: clamp(3rem, 9vw, 7rem); font-weight: 900; line-height: 1; color: #ff2d55;
    text-shadow: 0 4px 14px rgba(0,0,0,.6); pointer-events: none;
    opacity: 0; transition: opacity .35s ease, transform .35s cubic-bezier(.34,1.7,.5,1); }
  .vs__cross.on { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-8deg); }
  .vs__item img { height: clamp(46px, 6vw, 88px); max-width: clamp(120px, 16vw, 220px); width: auto; object-fit: contain;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,.5)); }
  .vs__item figcaption { font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 700; color: #e7eaf0; }
  .vs__sep { font-size: clamp(1.4rem, 3.5vw, 2.6rem); font-weight: 900; color: #fff;
    opacity: 0; transform: scale(.5); transition: opacity .4s ease, transform .4s cubic-bezier(.34,1.6,.5,1); }
  .vs__sep.on { opacity: 1; transform: none; }

  /* tricol — 3 colonnes titrées révélées au clic (Build or Buy) */
  .scene--tricol .scene__content { max-width: none; width: 100%; }
  .scene--tricol .scene__overlay { background:
    linear-gradient(180deg, rgba(11,13,18,.82), rgba(11,13,18,.9)); }
  .tri { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(.7rem, 1.6vw, 1.4rem); margin-top: .6rem; }
  .tri__col { padding: clamp(1.2rem, 2.2vw, 2rem); border-radius: 16px;
    border: 1px solid #2a3140; background: rgba(20,26,38,.75);
    opacity: 0; transform: translateY(20px); transition: opacity .5s ease, transform .5s ease; }
  .tri__col.on { opacity: 1; transform: none; }
  .tri__title { font-size: clamp(1.3rem, 2.6vw, 2rem); font-weight: 800; color: #fff; margin-bottom: .7em; }
  .tri__col[data-accent="build"] { border-color: var(--hot); }
  .tri__col[data-accent="build"] .tri__title { color: var(--hot); }
  .tri__col[data-accent="buy"] { border-color: var(--accent); }
  .tri__col[data-accent="buy"] .tri__title { color: var(--accent); }
  .tri__list { list-style: none; display: flex; flex-direction: column; gap: .7em; }
  .tri__list li { font-size: clamp(1.1rem, 2.1vw, 1.6rem); line-height: 1.35; color: #e7eaf0; padding-left: 1.1em; position: relative;
    opacity: 0; transform: translateX(-10px); transition: opacity .4s ease, transform .4s ease; }
  .tri__list li.on { opacity: 1; transform: none; }
  .tri__list li::before { content: "·"; position: absolute; left: .2em; color: var(--muted); font-weight: 900; }
  /* items avec marque (check vert / croix rouge / robot) */
  .tri__list--marked li { padding-left: 0; display: flex; align-items: flex-start; gap: .5em; }
  .tri__list--marked li::before { content: none; }
  .tri__mark { flex: 0 0 auto; font-weight: 900; }
  .tri__list li[data-mark="ok"] .tri__mark { color: var(--ok); }
  .tri__list li[data-mark="ko"] .tri__mark { color: var(--hot); }
  .tri__list li[data-mark="ko"] { color: var(--muted); }

  /* slide liste + compare : liste à gauche, compare vertical à droite (révélé au dernier clic) */
  .scene--list-cmp .scene__content { max-width: none; width: 100%; }
  .list-cmp { flex: 0 0 34%; display: flex; flex-direction: column; align-items: center; gap: 1rem;
    opacity: 0; transform: translateY(20px); transition: opacity .5s ease, transform .5s ease; }
  .list-cmp.on { opacity: 1; transform: none; }
  .list-cmp__col { display: flex; flex-direction: column; align-items: center; gap: .4rem; }
  .list-cmp__arrow { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--muted); line-height: 1; }
  .list-cmp__title { font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 700; color: #e7eaf0; }
  .list-cmp__row { display: flex; align-items: center; gap: clamp(1rem, 3vw, 2.5rem); }
  .list-cmp__val { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums; line-height: 1; }
  .list-cmp__val--hot { color: var(--hot); }
  .list-cmp__lbl { font-size: clamp(.85rem, 1.6vw, 1.05rem); color: var(--muted); text-align: center; margin-top: .4em; }
  .list-cmp__arrow { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--muted); }

  /* 2 briques Lego : base + brique qui tombe de très haut et s'emboîte (pas de contour) */
  .bricks { flex: 0 0 40%; max-width: 40%; position: relative; height: clamp(240px, 38vh, 380px); align-self: center; }
  .bricks__base, .bricks__top { position: absolute; left: 50%; width: clamp(180px, 22vw, 280px);
    height: auto; filter: drop-shadow(0 12px 22px rgba(0,0,0,.5)); }
  .bricks__base { bottom: 6%; transform: translateX(-50%); z-index: 1; }
  /* brique du dessus : démarre très haut, tombe et s'EMBOÎTE (tenons du dessous sur le dessus de la base) */
  .bricks__top { bottom: 6%; z-index: 2; opacity: 0;
    transform: translate(-50%, -220%); }
  .scene.is-active .bricks__top.on { opacity: 1;
    transform: translate(-50%, -72%);
    transition: transform .75s cubic-bezier(.45,.05,.35,1.2), opacity .2s ease; }

  /* bloc décision « Build vs Buy » → au clic Build barré + patch « Agentic ? » */
  .scene--decision .list-split { align-items: center; }
  .decis { flex: 1 1 55%; position: relative; display: flex; align-items: center; justify-content: center;
    gap: clamp(.6rem, 1.5vw, 1.4rem); font-weight: 800; }
  .decis__opt { font-size: clamp(2rem, 5vw, 4rem); color: #fff; position: relative; transition: opacity .4s ease; }
  .decis__vs { font-size: clamp(1.1rem, 2.5vw, 1.8rem); color: var(--muted); }
  /* trait qui barre "Build" */
  .decis__build::after { content: ""; position: absolute; left: -6%; right: -6%; top: 50%; height: 5px;
    background: var(--hot); border-radius: 3px; transform: scaleX(0); transform-origin: left;
    transition: transform .45s cubic-bezier(.5,.1,.3,1); }
  .decis.is-struck .decis__build { opacity: .5; }
  .decis.is-struck .decis__build::after { transform: scaleX(1); }
  /* patch "Agentic !" atterrit PAR-DESSUS "Build" (enfant de .decis__build, centré dessus) */
  .decis__patch { position: absolute; left: 50%; top: 50%;
    padding: .2em .7em; border-radius: 10px; background: var(--hot); color: #0b0d12;
    font-size: clamp(1.1rem, 2.6vw, 2rem); font-weight: 900; white-space: nowrap;
    box-shadow: 0 12px 30px rgba(0,0,0,.5);
    opacity: 0; transform: translate(-50%, -180%) rotate(-16deg) scale(1.4); pointer-events: none; }
  .decis.is-struck .decis__patch { opacity: 1;
    transform: translate(-50%, -50%) rotate(-9deg) scale(1);
    transition: opacity .25s ease, transform .5s cubic-bezier(.34,1.5,.5,1); }

  /* table verdict */
  .verdict { border-collapse: collapse; margin-top: .6em; font-size: clamp(.8rem, 1.6vw, 1.05rem); width: min(900px, 92vw); }
  .verdict th { text-align: left; color: var(--muted); font-weight: 600; padding: .5em .8em; border-bottom: 1px solid #2a3140; }
  .verdict td { padding: .55em .8em; border-bottom: 1px solid #1a1f29; }
  .verdict tbody tr { opacity: 0; transform: translateY(10px); transition: all .45s ease; }
  .verdict tbody tr.on { opacity: 1; transform: none; }
  .verdict td.ok { color: var(--ok); font-weight: 700; }
  .verdict td.ko { color: var(--hot); font-weight: 700; }
  .verdict td.warn { color: var(--warn); font-weight: 700; }

  /* marquee — mur de marques qui défile en boucle */
  .mq { width: 100vw; margin-left: calc(50% - 50vw); margin-top: 1.5rem;
    display: flex; flex-direction: column; gap: clamp(.8rem, 2vh, 1.6rem);
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
  .mq__row { overflow: hidden; }
  .mq__track { display: flex; gap: clamp(.8rem, 1.6vw, 1.4rem); width: max-content; }
  .mq__track.mq--left  { animation: mq-left  var(--dur) linear infinite; }
  .mq__track.mq--right { animation: mq-right var(--dur) linear infinite; }
  .mq__tile { flex: 0 0 auto; width: clamp(140px, 16vw, 220px); height: clamp(70px, 8vw, 110px);
    border-radius: 14px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,.35); }
  .mq__tile img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
  @keyframes mq-left  { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
  @keyframes mq-right { from { transform: translateX(-50%); } to { transform: translateX(0); } }
  @media (prefers-reduced-motion: reduce) { .mq__track { animation: none; } }

  /* model — le modèle 3 faces (cartes B2C / B2B stylistes / B2B marques) */
  .faces { display: flex; gap: clamp(1rem, 2.5vw, 2rem); margin-top: 1.5rem; flex-wrap: wrap; }
  .face { flex: 1 1 240px; padding: clamp(1.2rem, 2.5vw, 2rem); border-radius: 16px;
    border: 1px solid #2a3140; background: linear-gradient(160deg, #161b24, #0e1219);
    opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
  .scene.is-active .face { opacity: 1; transform: none; }
  .scene.is-active .face:nth-child(2) { transition-delay: .15s; }
  .scene.is-active .face:nth-child(3) { transition-delay: .3s; }
  .face__tag { font: 700 12px/1 -apple-system, sans-serif; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); }
  .face__title { font-size: clamp(1.3rem, 2.8vw, 1.9rem); font-weight: 800; margin: .5em 0 .3em; }
  .face__desc { color: var(--muted); font-size: clamp(.95rem, 1.8vw, 1.1rem); }
  .face[data-accent="brands"] .face__tag { color: var(--hot); }
  .face[data-accent="brands"] { border-color: var(--hot); }

  /* flow B2B2C — maillons en colonne à gauche, gros segment + flèche + label */
  .flow { display: flex; flex-direction: column; gap: clamp(.4rem, 1.4vh, 1rem); margin-top: 1.2rem; }
  .flow__step { display: flex; align-items: center; gap: clamp(.8rem, 2vw, 1.6rem);
    opacity: 0; transform: translateX(-28px); transition: opacity .5s ease, transform .5s ease; }
  .scene.is-active .flow__step.on { opacity: 1; transform: none; }
  .flow__seg { font-size: clamp(2.6rem, 7vw, 5rem); font-weight: 900; letter-spacing: -.03em;
    color: var(--fg); line-height: 1; min-width: 1.4ch; text-align: center;
    text-shadow: 0 2px 18px rgba(0,0,0,.6); }
  .flow__arrow { color: var(--muted); font-size: clamp(1.2rem, 3vw, 2rem); }
  .flow__label { font-size: clamp(1rem, 2.4vw, 1.6rem); color: #e7eaf0; font-weight: 600;
    text-shadow: 0 1px 10px rgba(0,0,0,.7); }
  .flow__step[data-accent] .flow__seg { color: var(--accent); }
  .flow__step[data-accent] .flow__label { color: #fff; }

  /* hub — "business in a box" : centre (l'indépendante) + modules en cercle */
  .hub { position: relative; width: min(620px, 80vw); aspect-ratio: 1; margin: 1rem auto 0; }
  .hub__center { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(.8);
    width: clamp(150px, 22vw, 220px); height: clamp(150px, 22vw, 220px); border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(circle at 40% 35%, #2a3550, #141a26);
    border: 2px solid var(--accent); box-shadow: 0 0 0 8px rgba(110,168,254,.15), 0 12px 40px rgba(0,0,0,.6);
    opacity: 0; transition: opacity .6s ease, transform .6s cubic-bezier(.34,1.4,.5,1); z-index: 3; }
  .hub__center.on { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  .hub__center-title { font-size: clamp(1.3rem, 3vw, 2rem); font-weight: 800; }
  .hub__center-sub { font-size: clamp(.8rem, 1.6vw, 1rem); color: var(--muted); margin-top: .3em; padding: 0 1em; }
  .hub__mod { position: absolute; left: var(--mx); top: var(--my); transform: translate(-50%,-50%) scale(.7);
    display: flex; align-items: center; gap: .5em; padding: .6em 1em; border-radius: 999px;
    background: rgba(20,26,38,.92); border: 1px solid #2a3140; white-space: nowrap;
    font-size: clamp(.85rem, 1.7vw, 1.1rem); font-weight: 600; color: #e7eaf0;
    box-shadow: 0 8px 24px rgba(0,0,0,.5); opacity: 0;
    transition: opacity .5s ease, transform .5s cubic-bezier(.34,1.4,.5,1); z-index: 2; }
  .hub__mod.on { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  .hub__icon { font-size: 1.2em; }
  .hub__caption { text-align: center; margin-top: 1.5rem; }

  #progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0; z-index: 50; transition: width .2s ease; }
  #brand { position: fixed; top: clamp(18px, 3vh, 32px); left: clamp(18px, 3vw, 40px); z-index: 60; line-height: 0; }
  #brand svg { height: clamp(22px, 3.2vh, 34px); width: auto; display: block; }
  #hint { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); color: var(--muted); font-size: 13px; z-index: 50; opacity: .8; }
  #dots { position: fixed; right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 50; }
  #dots button { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--muted); background: transparent; cursor: pointer; padding: 0; }
  #dots button.active { background: var(--accent); border-color: var(--accent); }
</style>
</head>
